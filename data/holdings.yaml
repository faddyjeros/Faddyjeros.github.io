# Portfolio holdings — edit this file when you buy, sell, or adjust positions.
#
# Fields:
#   ticker   - Yahoo Finance symbol (exactly as on finance.yahoo.com)
#   shares   - Number of shares/units you own
#   bep      - Breakeven price per share (average cost in ticker's quote currency)
#   currency - Quote currency of the ticker (USD/EUR/CHF/GBP)
#   name     - Your own label for the position (displayed on the site)
#   bought   - Rough date you took the position (YYYY-MM-DD, optional)
#   note     - Short commentary shown under the row on the portfolio page.
#              Use '>' for multi-line (YAML folds newlines into spaces).

