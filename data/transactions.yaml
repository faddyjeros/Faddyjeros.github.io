# Transaction log — publicly-visible record of buys and sells.
#
# Sourced from Degiro CSV (2019-2025) and Boursorama PEA operation notices (2024).
# Same-day transactions in the same ticker are collapsed into a single entry
# at the weighted-average price.
#
# Fields:
#   date     - YYYY-MM-DD
#   action   - buy | sell
#   ticker   - Yahoo Finance symbol
#   shares   - Positive number (whether buy or sell)
#   price    - Price per share in the ticker's quote currency
#   currency - Quote currency (USD/EUR)
#   note     - Optional commentary

