name: Deploy Finance App → Azure

on:
  push:
    branches: [main]
    paths:
      - "finance-app/**"
      - ".github/workflows/deploy-finance.yml"
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  BACKEND_IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/finance-backend
  FRONTEND_IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/finance-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image tag
        id: tag
        run: echo "TAG=$(echo $GITHUB_SHA | head -c8)" >> $GITHUB_OUTPUT

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./finance-app/backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.TAG }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./finance-app/frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.TAG }}
            ${{ env.FRONTEND_IMAGE }}:latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend Container App
        run: |
          az containerapp registry set \
            --name finance-backend \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --server ${{ secrets.ACR_LOGIN_SERVER }} \
            --username ${{ secrets.ACR_USERNAME }} \
            --password ${{ secrets.ACR_PASSWORD }}
          az containerapp update \
            --name finance-backend \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.TAG }} \
            --set-env-vars \
              "DB_PATH=/data/finance.db" \
              "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
              "FMP_API_KEY=${{ secrets.FMP_API_KEY }}" \
              "ACCOUNTING_XLSX=/data/accounting.xlsx"

      - name: Deploy frontend Container App
        run: |
          az containerapp registry set \
            --name finance-frontend \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --server ${{ secrets.ACR_LOGIN_SERVER }} \
            --username ${{ secrets.ACR_USERNAME }} \
            --password ${{ secrets.ACR_PASSWORD }}
          az containerapp update \
            --name finance-frontend \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.TAG }} \
            --set-env-vars \
              "BACKEND_HOST=finance-backend" \
              "AUTH_USER=${{ secrets.FINANCE_AUTH_USER }}" \
              "AUTH_PASS=${{ secrets.FINANCE_AUTH_PASS }}"

      - name: Health check
        run: |
          echo "Waiting for deploy to settle..."
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "${{ secrets.FINANCE_AUTH_USER }}:${{ secrets.FINANCE_AUTH_PASS }}" \
            "https://finance-frontend.purplepebble-68555cc9.northeurope.azurecontainerapps.io" || echo "000")
          echo "Health check: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARNING: health check returned $STATUS — app may still be starting"
          fi
